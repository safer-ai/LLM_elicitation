# OC3 DDoS Attack Scenario Baselines
# These values represent expert estimates for a distributed denial of service attack

# Data source and output configuration
estimate_csv: OC3_ddos_estimates.csv
output_path: OC3_DDOS/
description: "OC3 DDoS attack estimates"

