anthropic_api_key: "YOUR_ANTHROPIC_API_KEY_HERE"
openai_api_key: "YOUR_OPENAI_API_KEY_HERE"
gemini_api_key: "YOUR_GEMINI_API_KEY_HERE"

prompts_dir: prompt_sensitivity/prompts_trim_reasoning
expert_profiles_file: prompt_sensitivity/single_expert.yaml
default_benchmark_file: input_data/benchmark/bountybench_ordered.yaml
scenario_file: prompt_sensitivity/scenario/scenario_control.yaml

llm_settings:
  model: "claude-sonnet-4-5"
  temperature: 1.0
  max_concurrent_calls: 1
  rate_limit_calls: 4
  min_seconds_between_calls: 20
  rate_limit_period: 60
  thinking:
    enabled: false
    budget_tokens: 6000

workflow_settings:
  num_tasks: 1
  scenario_steps: ["TA0002 - Execution"]
  num_experts: 1
  delphi_rounds: 1
  convergence_threshold: 100.0
  estimate_num_actors_per_task_benchmark: false
  estimate_num_attacks_per_task_benchmark: false
  estimate_damage_per_task_benchmark: false
  include_easier_tasks: true
  num_example_tasks: 2

output_dir: prompt_sensitivity/output
