    A substring is a contiguous sequence of characters within a string.\ns[x:y] represents\
    \ the substring consisting of characters from the index x to index y in s, both\
    \ inclusive.\n\n \nExample 1:\n\nInput: s = \"abcabc\", queries = [[1,1,3,5],[0,2,5,5]]\n\
