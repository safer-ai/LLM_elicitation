    \ the specification and passes all tests. You will NOT return anything except\
    \ for the program.\n### Question:\nThere are N countries numbered 1 to N. For\
    \ each i = 1, 2, \\ldots, N, Takahashi has A_i units of the currency of country\
    \ i.\nTakahashi can repeat the following operation any number of times, possibly\
    \ zero:\n\n- First, choose an integer i between 1 and N-1, inclusive.\n- Then,\
    \ if Takahashi has at least S_i units of the currency of country i, he performs\
    \ the following action once:\n- Pay S_i units of the currency of country i and\
    \ gain T_i units of the currency of country (i+1).\n\n\n\nPrint the maximum possible\
    \ number of units of the currency of country N that Takahashi could have in the\
    \ end.\n\nInput\n\nThe input is given from Standard Input in the following format:\n\
    N\r\nA_1 A_2 \\ldots A_N\r\nS_1 T_1\r\nS_2 T_2\r\n\\vdots\r\nS_{N-1} T_{N-1}\n\
    \nOutput\n\nPrint the answer.\n\nConstraints\n\n\n- All input values are integers.\n\
    - 2 \\leq N \\leq 2 \\times 10^5\n- 0 \\leq A_i \\leq 10^9\n- 1 \\leq T_i \\leq\
    \ S_i \\leq 10^9\n\nSample Input 1\n\n4\r\n5 7 0 3\r\n2 2\r\n4 3\r\n5 2\n\nSample\
    \ Output 1\n\n5\r\n\nIn the following explanation, let the sequence A = (A_1,\
    \ A_2, A_3, A_4) represent the numbers of units of the currencies of the countries\
    \ Takahashi has. Initially, A = (5, 7, 0, 3).\nConsider performing the operation\
    \ four times as follows:\n\n- Choose i = 2, pay four units of the currency of\
    \ country 2, and gain three units of the currency of country 3. Now, A = (5, 3,\
    \ 3, 3).\n- Choose i = 1, pay two units of the currency of country 1, and gain\
    \ two units of the currency of country 2. Now, A = (3, 5, 3, 3).\n- Choose i =\
    \ 2, pay four units of the currency of country 2, and gain three units of the\
    \ currency of country 3. Now, A = (3, 1, 6, 3).\n- Choose i = 3, pay five units\
    \ of the currency of country 3, and gain two units of the currency of country\
    \ 4. Now, A = (3, 1, 1, 5).\n\nAt this point, Takahashi has five units of the\
    \ currency of country 4, which is the maximum possible number.\n\nSample Input\
    \ 2\n\n10\r\n32 6 46 9 37 8 33 14 31 5\r\n5 5\r\n3 1\r\n4 3\r\n2 2\r\n3 2\r\n\
    3 2\r\n4 4\r\n3 3\r\n3 1\n\nSample Output 2\n\n45\n\n### Format: Read the inputs\
    \ from stdin solve the problem and write the answer to stdout (do not directly\
    \ test on the sample inputs). Enclose your code within delimiters as follows.\n\
    ```python\n# YOUR CODE HERE\n```\n\n### Answer: (use the provided format with\
    \ backticks)\n\n"
  public_test_cases: '[{"input": "4\n5 7 0 3\n2 2\n4 3\n5 2\n", "output": "5\n", "testtype":
    "stdin"}, {"input": "10\n32 6 46 9 37 8 33 14 31 5\n5 5\n3 1\n4 3\n2 2\n3 2\n3
