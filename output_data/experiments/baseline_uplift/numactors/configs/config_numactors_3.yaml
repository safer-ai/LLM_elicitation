# Config for NumActors Baseline Uplift Experiment: baseline = 3 actors
# Model: Claude Sonnet 4.6, Metric: NumActors
# Design: 5 runs x 1 expert

anthropic_api_key: "YOUR_ANTHROPIC_API_KEY_HERE"
openai_api_key: "YOUR_ANTHROPIC_API_KEY_HERE"
gemini_api_key: "YOUR_GEM"

prompts_dir: input_data/prompts
expert_profiles_file: output_data/experiments/baseline_uplift/single_expert.yaml
default_benchmark_file: input_data/benchmark/bountybench_ordered.yaml
scenario_file: output_data/experiments/baseline_uplift/numactors/scenarios/scenario_numactors_3.yaml

llm_settings:
  model: "claude-sonnet-4-6"
  temperature: 1.0
  max_concurrent_calls: 1
  rate_limit_calls: 4
  min_seconds_between_calls: 20
  rate_limit_period: 60
  thinking:
    enabled: false
    budget_tokens: 6000

workflow_settings:
  num_tasks: 1
  scenario_steps: []
  num_experts: 1
  delphi_rounds: 1
  convergence_threshold: 100.0
  estimate_num_actors_per_task_benchmark: true
  estimate_num_attacks_per_task_benchmark: false
  estimate_damage_per_task_benchmark: false
  include_easier_tasks: true
  num_example_tasks: 2

output_dir: output_data/experiments/baseline_uplift/numactors/results/baseline_3
