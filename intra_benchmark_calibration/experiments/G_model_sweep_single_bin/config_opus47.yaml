# =============================================================================
# Experiment G — model sweep
# Elicitation model: claude-opus-4-7 (Opus 4.7, latest)
#
# Opus 4.7 uses adaptive thinking (not extended thinking).
# reasoning_effort="high" maps to output_config.effort="high".
#
# Design: all_except_target, K=3, 1 expert (Case A)
#   5 target bins × 12 forecasted models × 3 tasks = 180 cells
#   180 × 2 API calls (analysis + estimation)       = 360 API calls
# =============================================================================

intra_benchmark_settings:
  lyptus_repo_dir: ~/lyptus-data
  drop_models: ["GPT-2", "GPT-3", "GPT-3.5"]
  forecasted_models: null

  binning:
    n_bins: 5
    strategy: equal_count

  target_selection:
    selection_mode: auto_sample
    n_target_tasks_per_cell: 3    # K=3: 3 separate elicitations, one target task each
    sampling_seed: 42

  source_profile:
    source_bins_to_show: "all_except_target"   # show all 4 other bins as source context
    n_examples_per_source_bin: 2

  include_target_solution: false

prompts_dir: prompts
expert_profiles_file: ../../../inter_benchmark_calibration/input_data/expert_profiles/expert_profiles.yaml
output_dir: results

llm_settings:
  model: "claude-opus-4-7"
  temperature: 1.0
  max_concurrent_calls: 10
  rate_limit_calls: 200
  rate_limit_period: 60
  reasoning_effort: "high"   # adaptive thinking for Opus 4.7

workflow_settings:
  num_experts: 1
  delphi_rounds: 1
  convergence_threshold: 0.05
  num_repeats: 1
