# =============================================================================
# Experiment G — model sweep (Case A design)
#
# Tests Claude models on the same elicitation task to measure capability
# scaling in forecasting quality.
#
# Design: all_except_target, K=3, 1 expert
#   - 5 bins (equal_count)
#   - all_except_target: for each target bin j, all 4 other bins shown as source
#   - 12 forecasted models (after dropping GPT-2/3/3.5)
#   - K=3 target tasks per cell (3 separate elicitations, 1 target task each)
#   - 1 expert persona
#   - 1 Delphi round
#
# Cell count:  5 target bins × 12 models × 3 tasks = 180 cells / forecaster
# API calls:   180 × 2 (analysis + estimation)      = 360 / forecaster
#
# Models in the sweep:
#   1. claude-haiku-4-5   — Haiku 4.5 (no extended thinking; reasoning_effort=off)
#   2. claude-opus-4-7    — Opus 4.7 (adaptive thinking; reasoning_effort=high)
#   Note: claude-sonnet-4-6 results already available from prior runs.
#
# IMPORTANT: Haiku and Opus require different reasoning_effort settings.
# Run them using their individual configs to avoid mismatches:
#   python run_calibration.py -c config_haiku45.yaml
#   python run_calibration.py -c config_opus47.yaml
#
# This file is a combined reference only. If running the sweep jointly,
# reasoning_effort="off" is used (safe for both models; Opus loses thinking).
# =============================================================================

intra_benchmark_settings:
  lyptus_repo_dir: ~/lyptus-data
  drop_models: ["GPT-2", "GPT-3", "GPT-3.5"]
  forecasted_models: null   # null → all 12 models post-drop

  binning:
    n_bins: 5
    strategy: equal_count

  target_selection:
    selection_mode: auto_sample
    n_target_tasks_per_cell: 3    # K=3: 3 separate elicitations, one target task each
    sampling_seed: 42

  source_profile:
    source_bins_to_show: "all_except_target"   # show all 4 other bins as source context
    n_examples_per_source_bin: 2

  include_target_solution: false

prompts_dir: prompts
expert_profiles_file: ../../../inter_benchmark_calibration/input_data/expert_profiles/expert_profiles.yaml
output_dir: results

llm_settings:
  # Use individual per-model configs (config_haiku45.yaml, config_opus47.yaml)
  # for correct reasoning_effort per model. This combined sweep uses "off"
  # as a safe fallback for both.
  model:
    - "claude-haiku-4-5"   # Haiku 4.5 — no extended thinking
    - "claude-opus-4-7"    # Opus 4.7  — adaptive thinking (use config_opus47.yaml for "high")

  temperature: 1.0
  max_concurrent_calls: 10
  rate_limit_calls: 200
  rate_limit_period: 60
  reasoning_effort: "off"   # safe default for combined sweep; see per-model configs

workflow_settings:
  num_experts: 1
  delphi_rounds: 1
  convergence_threshold: 0.05
  num_repeats: 1
