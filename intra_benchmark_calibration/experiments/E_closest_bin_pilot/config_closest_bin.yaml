# Experiment E: closest_bin pilot
# For each target bin j, show only the single source bin i whose panel-wide
# mean pass rate is closest to bin j's. This gives exactly 5 (i,j) pairs:
#   bin 0 -> source 1  (rates 0.931 vs 0.869, diff 0.062)
#   bin 1 -> source 0  (rates 0.869 vs 0.931, diff 0.062)
#   bin 2 -> source 1  (rates 0.577 vs 0.869, diff 0.292)
#   bin 3 -> source 4  (rates 0.272 vs 0.197, diff 0.075)
#   bin 4 -> source 3  (rates 0.197 vs 0.272, diff 0.075)
#
# Cell count: 5 pairs x 12 models x K=1 x 2 experts = 120 rows
# API calls:  120 elicitations x 2 calls = 240 total  (~$4, ~30 min)
# Everything else identical to run C (single_bin, thinking on, T=1.0).

llm_settings:
  model: claude-sonnet-4-6
  temperature: 1.0
  max_concurrent_calls: 5
  rate_limit_calls: 45
  rate_limit_period: 60
  thinking:
    enabled: true
    budget_tokens: 10000

workflow_settings:
  num_experts: 2
  delphi_rounds: 1
  convergence_threshold: 0.05

intra_benchmark_settings:
  lyptus_repo_dir: ~/lyptus-data
  drop_models: ["GPT-2", "GPT-3", "GPT-3.5"]
  binning:
    n_bins: 5
    strategy: equal_count
  target_selection:
    selection_mode: auto_sample
    n_target_tasks_per_cell: 1
    sampling_seed: 42
  source_profile:
    source_bins_to_show: "closest_bin"   # key change from run C
    n_examples_per_source_bin: 2
    resample_anchors_per_target: false
  include_target_solution: false

prompts_dir: prompts
expert_profiles_file: ../../../inter_benchmark_calibration/input_data/expert_profiles/expert_profiles.yaml
output_dir: results
