# =============================================================================
# Experiment H — target-task variance study, bin 1
#
# Goal: test whether the high Brier variance observed in bin 3 is specific
# to the difficulty-transition zone, or is a general property of all bins.
# Bin 1 (~3–13 min FST) is an easy bin where most models succeed (~88% GT
# pass rate) — expected to show much lower variance than bin 3.
#
# Design mirrors H_task_variance_bin3 exactly:
#   - Source: ALL bins except the target (all_except_target = B-style setup)
#   - Target bin: ONLY bin 1 (~3–13 min FST)
#   - Target tasks: 20 tasks explicitly listed from bin 1 (random.seed=42)
#   - Bins 0,2,3,4: empty explicit lists → skipped entirely (no API calls)
#   - 1 expert, 1 Delphi round, 1 repeat
#   - Forecaster: claude-sonnet-4-6 (same as exp C baseline)
#
# Cell count: 1 target bin × 20 tasks × 12 models = 240 cells
# API calls:  240 × 2 (analysis + estimation)      = 480
# Estimated cost: ~$17 (calibrated from Exp F actual cost)
# =============================================================================

intra_benchmark_settings:
  lyptus_repo_dir: ~/lyptus-data
  drop_models: ["GPT-2", "GPT-3", "GPT-3.5"]
  forecasted_models: null   # null → all 12 models post-drop

  binning:
    n_bins: 5
    strategy: equal_count

  target_selection:
    selection_mode: auto_sample
    n_target_tasks_per_cell: 1    # ignored for bins with explicit lists
    sampling_seed: 42
    # Bins 0,2,3,4: empty → no cells generated for those bins.
    # Bin 1 (FST 2.8–12.6 min by real compute_bins edges): 20 tasks sampled
    # deterministically (random.seed=42) from the 54 bin-1 tasks in the
    # filtered dataset (after the 22 dropped due to no `estimation_instructions`).
    explicit_target_tasks:
      0: []
      1:
        - "cybashbench_web/blanks_100"
        - "cybashbench_misc/multistep_030"
        - "intercode-ctf_reverse/task_44"
        - "nl2bash_medium/task_6042"
        - "primary_knowledge"
        - "packedaway"
        - "intercode-ctf_reverse/task_68"
        - "intercode-ctf_reverse/task_78"
        - "2016q-for-kill"
        - "cybashbench_forensics/nl2bash_064"
        - "cybashbench_crypto/multistep_026"
        - "2021q-for-lazy_leaks"
        - "cybashbench_web/multistep_025"
        - "lootstash"
        - "intercode-ctf_reverse/task_83"
        - "cybashbench_web/blanks_074"
        - "cybashbench_web/contextual_069"
        - "it_has_begun"
        - "CVE-2024-5084"
        - "intercode-ctf_reverse/task_71"
      2: []
      3: []
      4: []

  source_profile:
    source_bins_to_show: "all_except_target"   # B-style: show all 4 other bins
    n_examples_per_source_bin: 2

  include_target_solution: false

prompts_dir: prompts
expert_profiles_file: ../../../inter_benchmark_calibration/input_data/expert_profiles/expert_profiles.yaml
output_dir: results

llm_settings:
  model: "claude-sonnet-4-6"
  temperature: 1.0
  max_concurrent_calls: 10
  rate_limit_calls: 200
  rate_limit_period: 60
  reasoning_effort: "high"   # extended thinking, same as exp B/G

workflow_settings:
  num_experts: 1       # 1 expert (per-expert analysis showed no quality loss)
  delphi_rounds: 1
  convergence_threshold: 0.05
  num_repeats: 1       # variance comes from 20 tasks, not from repeats
