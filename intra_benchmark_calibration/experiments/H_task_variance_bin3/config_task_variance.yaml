# =============================================================================
# Experiment H — target-task variance study, bin 3
#
# Goal: measure how much the Brier score fluctuates depending on WHICH task
# within the target bin is chosen. If variance is large, K=1 task selection
# is fragile. If small, any task from the bin is equally representative.
#
# Design:
#   - Source: ALL bins except the target (all_except_target = B-style setup)
#   - Target bin: ONLY bin 3 (~30–134 min FST) — the most interesting range
#   - Target tasks: 20 tasks explicitly listed from bin 3 (random_state=42)
#   - Bins 0,1,2,4: empty explicit lists → skipped entirely (no API calls)
#   - 1 expert, 1 Delphi round, 1 repeat
#   - Forecaster: claude-sonnet-4-6 (same as exp C baseline)
#
# Cell count: 1 target bin × 20 tasks × 12 models = 240 cells
# API calls:  240 × 2 (analysis + estimation)      = 480
# Estimated cost: ~$96 at Sonnet 4.6 with thinking
# =============================================================================

intra_benchmark_settings:
  lyptus_repo_dir: ~/lyptus-data
  drop_models: ["GPT-2", "GPT-3", "GPT-3.5"]
  forecasted_models: null   # null → all 12 models post-drop

  binning:
    n_bins: 5
    strategy: equal_count

  target_selection:
    selection_mode: auto_sample
    n_target_tasks_per_cell: 1    # ignored for bins with explicit lists
    sampling_seed: 42
    # Bins 0,1,2,4: empty → no cells generated for those bins.
    # Bin 3 (FST 60–150 min by real compute_bins edges): 20 tasks sampled
    # deterministically (random.seed=42) from the 55 bin-3 tasks in the
    # filtered dataset (after the 22 dropped due to no `estimation_instructions`).
    explicit_target_tasks:
      0: []
      1: []
      2: []
      3:
        - "2019q-cry-super_curve"
        - "arvo:23653"
        - "arvo:52317"
        - "failproof"
        - "flag_command"
        - "CVE-2024-4323"
        - "partial_tenacity"
        - "2021q-pwn-alien_math"
        - "2020q-pwn-roppity"
        - "2022q-cry-beyond_quantum"
        - "data_siege"
        - "avatar"
        - "2017q-rev-grumpcheck"
        - "CVE-2024-36412"
        - "arvo:67552"
        - "2017f-pwn-humm_sch_t"
        - "arvo:14619"
        - "arvo:11078"
        - "arvo:55587"
        - "arvo:60842"
      4: []

  source_profile:
    source_bins_to_show: "all_except_target"   # B-style: show all 4 other bins
    n_examples_per_source_bin: 2

  include_target_solution: false

prompts_dir: prompts
expert_profiles_file: ../../../inter_benchmark_calibration/input_data/expert_profiles/expert_profiles.yaml
output_dir: results

llm_settings:
  model: "claude-sonnet-4-6"
  temperature: 1.0
  max_concurrent_calls: 10
  rate_limit_calls: 200
  rate_limit_period: 60
  reasoning_effort: "high"   # extended thinking, same as exp B/G

workflow_settings:
  num_experts: 1       # 1 expert (per-expert analysis showed no quality loss)
  delphi_rounds: 1
  convergence_threshold: 0.05
  num_repeats: 1       # variance comes from 20 tasks, not from repeats
