# =============================================================================
# Production / "full" intra-benchmark calibration config.
#
# Mirrors the spec §6 defaults:
#   - n_bins=5, equal_count
#   - all forecasted models (default 12, after dropping GPT-2/3/3.5)
#   - K=1 target task per cell
#   - 1 source bin shown per cell (= source_bin_i only)  [single_bin mode]
#   - 2 anchor + easier tasks per shown bin (1 anchor + 2 easier = 3 tasks)
#   - num_experts=2, delphi_rounds=1
#
# Cell budget with these defaults (single_bin mode):
#   5 source bins x 4 target bins (i != j) x 12 models x 1 target = 240 cells
#   240 cells x 2 experts x (round 1 has 2 API calls/expert) = 960 API calls
#
# To get the "all_except_target" comparison condition (60 cells):
#   set source_profile.source_bins_to_show: "all_except_target"
# =============================================================================

intra_benchmark_settings:
  # Path to the Lyptus cyber-task-horizons-data checkout.
  lyptus_repo_dir: "/home/jkrys/gitrepos/cyber-task-horizons-data"

  # GPT-2/GPT-3/GPT-3.5 only have outcomes on the easier sub-benchmarks
  # (172/172/142 of the 269 headline tasks respectively), which would cause
  # most cells involving them to be inadmissible.
  drop_models: ["GPT-2", "GPT-3", "GPT-3.5"]

  # Models to forecast for. Either:
  #   null (or omitted) -> all models in outcomes matrix (post-drop, so 12)
  #   ["Sonnet 4.6", "Opus 4.6", ...] -> explicit subset
  # Available aliases in the panel (post-drop): Claude 3 Opus, DeepSeek V3.1, GLM-5, GPT-4o, GPT-5.1 Codex Max, GPT-5.2 Codex, GPT-5.3 Codex, Gemini 2.5 Pro, Opus 4, Opus 4.6, Sonnet 4.6, o3
  forecasted_models: null

  binning:
    # Number of difficulty bins over best_available_minutes (must be >= 2).
    n_bins: 5
    # Strategy options:
    #   "equal_count"     - equal number of headline tasks per bin (default;
    #                       robust to the heavy log-tail FST distribution).
    #   "equal_log_fst"   - equal log10(minutes) width per bin (cleaner edges
    #                       on a log axis, but very uneven counts: cybashbench
    #                       dominates the easy bins).
    #   "explicit_edges"  - user-supplied edges (then set `explicit_edges:` below).
    strategy: "equal_count"
    # Required only if strategy == "explicit_edges". Length must be n_bins+1.
    # Example: explicit_edges: [0.5, 5, 60, 300, 600, 2200]
    # explicit_edges: null

  target_selection:
    # How target tasks are picked from each target bin j:
    #   "auto_sample"            - stratified-by-log-FST sample, K per cell,
    #                              deterministic by `sampling_seed`.
    #   "explicit_target_tasks"  - user-supplied list per bin (paper-friendly,
    #                              fully reproducible). Then set
    #                              `explicit_target_tasks:` below as a dict
    #                              {bin_j: [task_id, ...]}.
    selection_mode: "auto_sample"
    sampling_seed: 42
    n_target_tasks_per_cell: 1  # K target tasks per cell
    # explicit_target_tasks:
    #   0: ["cybashbench_misc/contextual_001"]
    #   4: ["arvo:18882", "emaze"]

  source_profile:
    # Which bins to show in the per-cell capability profile of M.
    # Three modes:
    #   []                      -> "single_bin" mode (DEFAULT; spec §6).
    #                              Per cell shows only the source bin i.
    #                              Cells iterate over (i, j) for i != j;
    #                              bidirectional pairs.
    #   "all_except_target"     -> "all_except_target" mode.
    #                              Per cell shows all bins except j; the i
    #                              index is collapsed (no longer meaningful).
    #                              Cells iterate over j only:
    #                              n_bins x n_models x K (4x cheaper).
    #   [list of bin indices]   -> "custom_subset" mode. Shows the supplied
    #                              list regardless of i. NB: per-i prompts are
    #                              identical for fixed j -- mostly redundant
    #                              with the (i, j) iteration, useful only as
    #                              a temperature-stability sanity check.
    source_bins_to_show: []
    # Each shown bin contributes 1 anchor + this many easier tasks = (1 + N) tasks.
    n_examples_per_source_bin: 2

  # Optional: include the task's `solution_walkthrough` in the target-task
  # block of the prompt. Default false (= cleanly hidden from the forecaster).
  # There is NO equivalent for hints because Lyptus tasks have no separate
  # hints field.
  include_target_solution: false

# =============================================================================
# API keys: by default loaded from intra_benchmark_calibration/.env
# (project-local) or LLM_elicitation/.env (repo-root). To override here, add
# `anthropic_api_key: "sk-ant-..."` etc. -- but DO NOT commit a real key to git.
# config.py logs the key source + first 14 chars so you can verify which key
# is being used.
# =============================================================================

prompts_dir: "prompts"
expert_profiles_file: "../inter_benchmark_calibration/input_data/expert_profiles/expert_profiles.yaml"
output_dir: "results"

llm_settings:
  model: "claude-sonnet-4-6"
  temperature: 1.0
  max_concurrent_calls: 5
  rate_limit_calls: 45
  rate_limit_period: 60   # seconds

  thinking:
    enabled: true
    budget_tokens: 10000

workflow_settings:
  num_experts: 2
  delphi_rounds: 1
  convergence_threshold: 0.05
