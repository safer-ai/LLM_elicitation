# Configuration for Intra-Benchmark Calibration Experiment
# This enables LLMs to predict conditional probabilities P(j|i) = "probability
# a model can solve tasks in bin j, given it can solve all tasks in bin i"

# ============================================================================
# INTRA-BENCHMARK SPECIFIC SETTINGS
# ============================================================================
intra_benchmark_settings:
  # Name of the benchmark to analyze (must match ground truth file naming)
  benchmark_name: "cybench"

  # Number of bins used in ground truth computation
  # Must match the ground truth file: cybench_ground_truth_n{n_bins}.json
  n_bins: 4

  # Description of the benchmark (will be included in prompts to LLMs)
  # This provides context about what the benchmark measures and what metrics mean
  benchmark_description: |
    CyBench is a cybersecurity benchmark containing capture-the-flag (CTF) style challenges.
    Tasks cover various cybersecurity domains including reverse engineering, cryptography,
    web exploitation, binary exploitation, and forensics.

    FST (First Solve Time) measures how quickly the fastest human team could solve a task,
    measured in minutes. Lower FST indicates easier tasks that require less time and expertise.
    Higher FST indicates harder tasks requiring more advanced techniques or longer analysis.

    The benchmark tests practical cybersecurity problem-solving abilities across a range
    of difficulty levels.

  # Optional: Path to sorted benchmark file
  # If specified, this overrides benchmark_file below
  sorted_benchmark_file: "input_data/benchmarks/cybench_ascending_fst.yaml"

# ============================================================================
# API KEYS
# ============================================================================
# Provide the API key for the provider you're using
# ⚠️  WARNING: Do NOT commit this file with keys filled in!
anthropic_api_key: "YOUR_ANTHROPIC_API_KEY_HERE"
openai_api_key: "YOUR_OPENAI_API_KEY_HERE"

# ============================================================================
# INPUT DATA PATHS
# ============================================================================
# Paths are relative to intra_benchmark_calibration/ directory
prompts_dir: prompts  # Intra-benchmark specific prompts
expert_profiles_file: input_data/expert_profiles/expert_profiles.yaml  # Expert persona definitions
benchmark_file: input_data/benchmarks/cybench_ascending_fst.yaml  # Sorted benchmark
ground_truth_dir: input_data/ground_truth  # Directory containing ground truth files

# ============================================================================
# LLM & API INTERACTION SETTINGS
# ============================================================================
llm_settings:
  # Model to use for expert simulation
  model: "claude-sonnet-4-5-20250929"

  # Temperature controls randomness (0.0 = deterministic, 2.0 = very random)
  temperature: 0.8

  # Maximum number of API calls to run in parallel
  max_concurrent_calls: 5

  # Rate limiting to avoid 429 errors
  rate_limit_calls: 45       # Max calls per rate_limit_period
  rate_limit_period: 60      # Time window in seconds (typically 60 for RPM limits)

# ============================================================================
# DELPHI WORKFLOW SETTINGS
# ============================================================================
workflow_settings:
  # Number of experts to simulate (null = use all experts from expert_profiles_file)
  # For calibration experiments, recommend 5-10 experts for diverse perspectives
  num_experts: 5

  # Maximum number of Delphi deliberation rounds
  # Round 1: Initial independent estimates
  # Round 2+: Refinement after seeing other experts' reasoning
  delphi_rounds: 1

  # If expert estimates have std dev < threshold, stop before max rounds
  convergence_threshold: 0.05


# ============================================================================
# OUTPUT DIRECTORY
# ============================================================================
# Output directory for results (relative to intra_benchmark_calibration/)
output_dir: results  # Results will be saved to results/{benchmark}/{run_id}/

# ============================================================================
# NOTES ON USAGE
# ============================================================================
#
# 1. BEFORE RUNNING:
#    - Ensure ground truth file exists: input_data/ground_truth/{benchmark}_ground_truth_n{nbins}.json
#    - Run preprocessing: python prepare_benchmark.py <input_file> [--metric METRIC]
#    - This creates: input_data/benchmarks/{benchmark}_{sort_order}_{metric}.yaml
#
# 2. TO RUN:
#    python run_calibration.py -c config_example.yaml
#    # Or with your own config:
#    python run_calibration.py -c config.yaml
#    # Enable debug logging:
#    python run_calibration.py -c config.yaml -d
#
# 3. OUTPUT LOCATION:
#    results/{benchmark}/{run_id}/
#    - detailed_estimates.csv: Row per expert per round
#    - full_results.json: Complete Delphi deliberation history
#    - run_registry.json: Index of all runs (in results/ directory)
#
# 4. EXPECTED BEHAVIOR:
#    - For n_bins=4, there are 6 total (i,j) pairs: (0,1), (0,2), (0,3), (1,2), (1,3), (2,3)
#    - Ground truth filtering: only pairs with sufficient_sample==true are processed
#    - For cybench n_bins=4: 5 pairs have sufficient samples (2,3) is excluded
#    - Each pair runs complete Delphi study: 5 experts × 3 rounds (or until convergence)
#    - Each (i,j) pair is independent - no memory between predictions
#
# 5. COST ESTIMATION (for n_bins=4, 5 experts, 3 rounds):
#    - API calls per pair: ~15-20 calls (5 experts × 2 stages × rounds)
#    - Total for 5 pairs: ~75-100 API calls
#    - Estimated cost with Claude Sonnet: ~$2-5
#    - With GPT-4o: ~$3-8
#
# 6. EXPERT PROFILES:
#    - Use existing expert_profiles.yaml (security-focused experts)
#    - Or create custom expert profiles for ML/AI capability assessment
#    - Experts should have diverse perspectives to capture uncertainty
#
# ============================================================================
